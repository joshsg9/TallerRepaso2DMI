<!DOCTYPE html> <!-- Indica que es un documento HTML5 -->

<html lang="es"> <!-- Define el idioma de la página (español) -->

<head>
    <meta charset="UTF-8"> <!-- Permite usar caracteres especiales como tildes -->
    
    <title>E-commerce</title> <!-- Título que aparece en la pestaña del navegador -->
    
    <link rel="stylesheet" href="styles.css"> 
    <!-- Conecta el archivo CSS para aplicar estilos -->
</head>

<body>

    <h1>Catálogo de Productos</h1> 
    <!-- Título principal visible en la página -->

    <div id="catalogo"></div> 
    <!-- Contenedor vacío donde JavaScript va a insertar los productos dinámicamente -->

    <script src="app.js"></script> 
    <!-- Conecta el archivo JavaScript que maneja toda la lógica -->
    
</body>
</html>
